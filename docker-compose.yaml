services:
  backend:
    build:
      context: ./backend
    container_name: backend
    expose:
      - "8080"
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    networks:
      - app-network

  nginx:
    image: nginx:1.29.1-alpine
    container_name: nginx
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
