services:
  backend:
    build:
      context: ./backend
    container_name: backend
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.29
    container_name: nginx
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
